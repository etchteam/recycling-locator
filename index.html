<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/recycling-locator.css" />
    <title>Recycling Locator Widget Demo</title>
    <meta name="description" content="Find places to recycle, refill or reuse items." />
    <meta name="keywords" content="recycling, refill, reuse, recycle, locator, widget" />
    <meta name="robots" content="noindex, nofollow" />
    <!--
      CSP testing
      <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src data: https://rl.recyclenow.com https://*.here.com; script-src 'self' https://rl.recyclenow.com 'unsafe-eval'; connect-src blob: http://rl.test https://rl.recyclenow.com https://*.sentry.io https://*.hereapi.com https://*.here.com; style-src 'unsafe-inline' https://rl.recyclenow.com; font-src https://*.here.com; worker-src blob:;"
      />
    -->
    <style>
      @import url('https://esm.sh/@wrap.ngo/evergreen/fonts');
      @import url('https://esm.sh/@wrap.ngo/evergreen/styles');

      main {
        margin: 0 auto;
        max-width: 1440px;
        padding: var(--evg-spacing-md);
      }

      h1 {
        font-size: var(--evg-font-size-heading-lg);
      }

      #controls {
        display: flex;
        flex-direction: column;
        gap: var(--evg-spacing-sm);
      }

      #controls h2 {
        font-size: var(--evg-font-size-heading-sm);
        margin: 0;
      }

      #controls label {
        font-size: var(--evg-font-size-body-sm);
      }

      #controls select {
        border: 1px solid var(--evg-input-border);
        border-radius: var(--evg-input-border-radius);
        font-size: var(--evg-input-font-size);
        padding: var(--evg-input-padding);
        width: 100%;
      }

      .controls-toggle {
        display: none;
        font-size: var(--evg-font-size-body-xs);
        cursor: pointer;
        background: var(--evg-color-cloud);
        border: 1px solid var(--evg-input-border);
        border-radius: var(--evg-radius-sm);
        padding: var(--evg-spacing-xs) var(--evg-spacing-sm);
      }

      .standalone .controls-toggle {
        display: block;
        position: fixed;
        top: var(--evg-spacing-sm);
        right: var(--evg-spacing-sm);
        z-index: 1001;
      }

      @media (width >= 768px) {
        .layout {
          display: grid;
          grid-template-columns: 250px 1fr;
          gap: var(--evg-spacing-md);
        }
      }

      /* Standalone mode */
      .standalone main {
        max-width: none;
        padding: 0;
      }

      .standalone h1 {
        display: none;
      }

      .standalone .layout {
        display: block;
      }

      .standalone #controls h2 {
        display: none;
      }

      .standalone #controls {
        position: fixed;
        top: var(--evg-spacing-sm);
        right: var(--evg-spacing-sm);
        z-index: 1000;
        background: var(--evg-color-cloud);
        border: 1px solid var(--evg-input-border);
        border-radius: var(--evg-radius-sm);
        padding: var(--evg-spacing-md);
        box-shadow: var(--evg-shadow);
        width: 220px;
      }

      .standalone #controls.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="evg-theme-sand">
      <evg-wrapper gutter="md" size="xxxl">
        <evg-section padding="lg">
          <h1>Recycling Locator Widget Demo</h1>
        </evg-section>

        <div class="layout" id="layout">
          <nav id="controls">
            <h2>Preview controls</h2>
            <div>
              <label for="start-point">Start point</label>
              <select id="start-point">
                <option value="/">Default</option>
                <option value="/home-recycling">Home recycling</option>
                <option value="/refill">Refill</option>
                <option value="/material?name=Plastic drinks bottles">Pre-filled material</option>
                <option value="/EX32 8JL">Pre-filled location</option>
              </select>
            </div>

            <div>
              <label for="theme">Theme</label>
              <select id="theme">
                <option value="green">Green (Default)</option>
                <option value="red">Red</option>
                <option value="blue">Blue</option>
                <option value="orange">Orange</option>
                <option value="purple">Purple</option>
                <option value="brown">Brown</option>
                <option value="navy">Navy</option>
                <option value="black">Black</option>
                <option value="none">None</option>
              </select>
            </div>

            <div>
              <label for="locale">Locale</label>
              <select id="locale">
                <option value="">English</option>
                <option value="cy">Welsh (Cymraeg)</option>
                <option value="cy-GB">Wales (English)</option>
              </select>
            </div>

            <div>
              <label for="variant">Variant</label>
              <select id="variant">
                <option value="widget">Widget</option>
                <option value="standalone">Standalone</option>
              </select>
            </div>

          </nav>

          <button class="controls-toggle" id="controls-toggle" type="button">
            Hide controls
          </button>

          <recycling-locator></recycling-locator>
        </div>
      </evg-wrapper>
    </main>

    <script type="module" src="/src/index.tsx"></script>

    <script>
      const recyclingLocator = document.querySelector('recycling-locator');
      const controls = document.getElementById('controls');
      const toggleBtn = document.getElementById('controls-toggle');

      // Start point selector
      document.getElementById('start-point').addEventListener('change', (e) => {
        recyclingLocator.setAttribute('path', e.target.value);
      });

      // Theme selector
      document.getElementById('theme').addEventListener('change', (e) => {
        recyclingLocator.setAttribute('theme', e.target.value);
      });

      // Locale selector
      document.getElementById('locale').addEventListener('change', (e) => {
        if (e.target.value) {
          recyclingLocator.setAttribute('locale', e.target.value);
        } else {
          recyclingLocator.removeAttribute('locale');
        }
      });

      // Variant selector
      document.getElementById('variant').addEventListener('change', (e) => {
        const isStandalone = e.target.value === 'standalone';
        recyclingLocator.setAttribute('variant', e.target.value);
        document.body.classList.toggle('standalone', isStandalone);
      });

      // Toggle controls visibility (standalone mode)
      toggleBtn.addEventListener('click', () => {
        const isHidden = controls.classList.toggle('hidden');
        toggleBtn.textContent = isHidden ? 'Show controls' : 'Hide controls';
      });
    </script>

        /* eslint-enable */
      }
    </script>
  </body>
</html>
